version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ['*']

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    open-pull-requests-limit: 10
    groups:
      dependencies:
        patterns: ['*']
